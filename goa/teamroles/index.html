<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Roles — Gym Owner Advantage</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f8fafc;
      font-family: 'Inter', sans-serif;
    }

    .embed-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .nav-bar {
      background-color: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.03);
      z-index: 10;
    }

    .brand-logo {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.01em;
      text-transform: uppercase;
    }

    iframe {
      width: 100%;
      flex-grow: 1;
      border: none;
      background-color: #f8fafc;
    }

    .initial-load {
      position: absolute;
      top: 57px;
      left: 0;
      width: 100%;
      bottom: 0;
      background-color: #f8fafc;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 5;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .spinner {
      border: 3px solid #e2e8f0;
      border-top: 3px solid #1a73e8;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    .loading-text {
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      letter-spacing: 0.02em;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loaded .initial-load {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="embed-container" id="wrapper">

    <nav class="nav-bar">
      <div class="brand-logo">Gym Owner Advantage — Team Roles</div>
    </nav>

    <div class="initial-load" id="loader">
      <div class="spinner"></div>
      <div class="loading-text">LOADING...</div>
    </div>

    <iframe
      id="app-frame"
      src="https://script.google.com/macros/s/AKfycbwl4vZmmwqukTfgbno67ffeFKUR4J6_J6chaG-y5iEyckDzce7YFAOaN5kTdDYxwnxNQg/exec"
      onload="onFrameLoaded()">
    </iframe>

  </div>

  <script>
    function onFrameLoaded() {
      document.getElementById('wrapper').classList.add('loaded');
    }
  </script>

</body>
</html>
